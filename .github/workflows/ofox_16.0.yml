name: OrangeFox -fox_16.0- Build Beta

on:
  workflow_dispatch:
    inputs:
      SYNC_SOURCE:
        description: 'Select Sync Source'
        required: true
        default: 'GitHub'
        type: choice
        options:
          - 'GitLab'
          - 'GitHub'
      MANIFEST_BRANCH:
        description: 'OrangeFox Manifest Branch'
        required: true
        default: '16.0'
        type: choice
        options:
          - '12.1'
          - '11.0'
          - '16.0'
      DEVICE_TREE:
        description: 'OrangeFox Device Tree'
        required: true
        default: 'https://github.com/Mostafameesr/Neom_android_device_xiaomi_sweet-TWRP'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox Device Tree Branch'
        required: true
        default: 'fox_16.0'
      DEVICE_PATH:
        description: 'Specify your Device Path'
        required: true
        default: 'device/xiaomi/sweet'
      DEVICE_NAME:
        description: 'Specify your Device Codename'
        required: true
        default: 'sweet'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
          - 'boot'
          - 'recovery'
          - 'vendorboot'

jobs:
  build:
    name: Build OFR Beta by ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Telegram Script
        run: |
          cat <<'EOF' > /tmp/tg_bot.sh
          #!/bin/bash
          MSG="$(printf "$1")"
          
          # 1. Send to personal chat
          curl -s --fail \
            -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG" \
            -d parse_mode="Markdown" \
            -d disable_web_page_preview=true > /dev/null 2>&1 || true
            
          # 2. Send to group chat (if secret is provided)
          if [ -n "${{ secrets.TELEGRAM_GROUP_ID }}" ]; then
            curl -s --fail \
              -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_GROUP_ID }}" \
              -d text="$MSG" \
              -d parse_mode="Markdown" \
              -d disable_web_page_preview=true > /dev/null 2>&1 || true
          fi
          EOF
          chmod +x /tmp/tg_bot.sh
          /tmp/tg_bot.sh "🚀 *Starting OrangeFox Build*
          📱 **Device:** \`${{ inputs.DEVICE_NAME }}\`
          🌿 **Branch:** \`${{ inputs.MANIFEST_BRANCH }}\`
          👤 **By:** \`${{ github.actor }}\`
          🔗 [View Live Workflow Run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"

      - name: Clean-up
        uses: rokibhasansagar/slimhub_actions@main

      - name: Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 24

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: "10G"
          key: ${{ runner.os }}-fox-${{ inputs.MANIFEST_BRANCH }}

      - name: Build Environment
        run: |
          sudo apt install aria2 -y
          git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
          cd scripts
          sudo bash setup/android_build_env.sh

      - name: Set-up Manifest & Sync
        run: |
          /tmp/tg_bot.sh "⏳ *Syncing sources started...*
          Sync Source: \`${{ inputs.SYNC_SOURCE }}\`"
          
          START_TIME=$(date +%s)
          
          mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
          cd ${GITHUB_WORKSPACE}/OrangeFox
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          
          if [ "${{ inputs.SYNC_SOURCE }}" = "GitLab" ]; then
            git config --global url."https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.com/".insteadOf "https://gitlab.com/"
            git clone https://gitlab.com/OrangeFox/sync.git -b master sync_dir
            cd sync_dir
            bash orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          else
            git clone https://github.com/OrangeFox16/sync.git -b master sync_dir
            cd sync_dir
            bash orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          fi
          
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          rm -rf bootable/recovery
          rm -rf vendor/recovery
          
          if [ "${{ inputs.SYNC_SOURCE }}" = "GitLab" ]; then
            git clone https://gitlab.com/OrangeFox/Testing/Recovery.git -b fox_12.1_R12-new bootable/recovery
            git clone https://gitlab.com/OrangeFox/vendor/recovery.git -b fox_12.1-R12-new vendor/recovery
          else
            git clone https://github.com/OrangeFox16/android_bootable_recovery.git -b fox_16.0 bootable/recovery
            git clone https://github.com/OrangeFox16/android_vendor_recovery.git -b fox_16.0 vendor/recovery
          fi
          
          END_TIME=$(date +%s)
          DIFF=$((END_TIME - START_TIME))
          /tmp/tg_bot.sh "✅ *Sync completed successfully* ⏱️ Took: $((DIFF / 60)) mins and $((DIFF % 60)) secs."

      - name: Clone Device Tree
        run: |
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
          cd ${{ inputs.DEVICE_PATH }}
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          /tmp/tg_bot.sh "🌲 *Device tree cloned*
          Commit: \`$(git rev-parse --short HEAD)\`"

      - name: Building OrangeFox
        run: |
          /tmp/tg_bot.sh "⚙️ *Starting recovery build...*"
          START_TIME=$(date +%s)
          
          cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
          set +e
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          ccache -M 10G
          
          if [ "${{ inputs.MANIFEST_BRANCH }}" = "16.0" ]; then
            lunch twrp_${{ inputs.DEVICE_NAME }}-bp2a-eng
          else
            lunch twrp_${{ inputs.DEVICE_NAME }}-eng
          fi
          
          set -e
          mka adbd ${{ inputs.BUILD_TARGET }}image -j4
          ccache -s
          
          END_TIME=$(date +%s)
          DIFF=$((END_TIME - START_TIME))
          echo "BUILD_DIFF=$DIFF" >> $GITHUB_ENV

      - name: Set Release Properties
        run: |
          echo "BUILD_DATE=$(TZ=Asia/Cairo date +%Y%m%d)" >> $GITHUB_ENV
          DEVICE_TREE_URL="${{ inputs.DEVICE_TREE }}"
          [[ "${DEVICE_TREE_URL}" == *.git ]] && DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
          echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.img
            OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}/OrangeFox*.zip
          name: OrangeFox Recovery [${{ inputs.DEVICE_NAME }}] // ${{ env.BUILD_DATE }}
          tag_name: Build-${{ github.run_id }}-${{ env.BUILD_DATE }}
          body: |
            ## OrangeFox Recovery Build
            - **Device:** ${{ inputs.DEVICE_NAME }} (sweet)
            - **Sync Source:** ${{ inputs.SYNC_SOURCE }}
            - **Manifest Branch:** ${{ inputs.MANIFEST_BRANCH }}
            - **Build Type:** ${{ inputs.MANIFEST_BRANCH == '16.0' && 'bp2a-eng' || 'eng' }}
            - **Commit:** [Link](${{ env.DEVICE_TREE_URL }}/commit/${{ env.COMMIT_ID }})

      - name: Notify Release Success
        if: success()
        run: |
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/Build-${GITHUB_RUN_ID}-${{ env.BUILD_DATE }}"
          /tmp/tg_bot.sh "🎉 *Build and Release Successful!*
          ⏱️ Build Time: $(($BUILD_DIFF / 60)) mins and $(($BUILD_DIFF % 60)) secs.
          
          📱 **Device:** \`${{ inputs.DEVICE_NAME }}\`
          📦 **Android Version:** \`${{ inputs.MANIFEST_BRANCH }}\`
          
          🔗 [📥 Click here to download Recovery files]($RELEASE_URL)"

      - name: Notify Build Failure
        if: failure()
        run: |
          /tmp/tg_bot.sh "❌ *Build Failed!*
          An error occurred while building \`${{ inputs.DEVICE_NAME }}\`
          🔗 [🔍 Click here to view Logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
